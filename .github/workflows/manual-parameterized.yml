name: Parameterized Manual Workflow

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: "Application name"
        required: true
        type: string
      run_validation:
        description: "Run validation"
        required: true
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest

    outputs:
      validation_status: ${{ steps.set_status.outputs.validation_status }}

    steps:
      - name: Print inputs
        run: |
          echo "Application: ${{ inputs.application_name }}"
          echo "Run Validation: ${{ inputs.run_validation }}"

      - name: Set validation status
        id: set_status
        run: |
          if [ "${{ inputs.run_validation }}" = "true" ]; then
            echo "validation_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "validation_status=skipped" >> "$GITHUB_OUTPUT"
          fi

  summary:
    needs: validate
    if: needs.validate.outputs.validation_status == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Print execution summary
        run: |
          echo "Validation succeeded."
          echo "Workflow completed for application: ${{ inputs.application_name }}"
